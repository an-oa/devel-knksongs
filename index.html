<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鐘輝かう 歌サーチ</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://an-oa.github.io/knksongs/" />

  <!-- OGP -->
  <meta property="og:site_name" content="鐘輝かう 歌サーチ" />
  <meta property="og:title" content="鐘輝かう 歌サーチ" />
  <meta property="og:description" content="曲名・アーティスト名・読みで検索。配信/歌みた/ショート/切り抜き/収録、コラボ種別、リレー/ハモリ、日付範囲で絞り込み。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://an-oa.github.io/knksongs/" />
  <meta property="og:image" content="https://an-oa.github.io/knksongs/ogp.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="800" />

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="鐘輝かう 歌サーチ" />
  <meta name="twitter:description" content="曲名・アーティスト名・読みで検索。配信/歌みた/ショート/切り抜き/収録、コラボ種別、リレー/ハモリ、日付範囲で絞り込み。" />
  <meta name="twitter:image" content="https://an-oa.github.io/knksongs/ogp.png" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark-theme');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=21">
</head>
<body>

  <div id="sidebar-overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar" role="dialog" aria-modal="true" aria-labelledby="sidebar-title" aria-hidden="true">
    <div class="sidebar-header">
      <div class="sidebar-title-group">
        <h2 id="sidebar-title">検索・設定</h2>
        <div id="resultCount">接続中...</div>
      </div>
      <button id="close-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
    </div>

    <div class="sidebar-scroll-area">
      <section class="sidebar-group">
        <div class="sidebar-group-body">
          <div class="sidebar-section">
            <div class="section-header">
              <label class="section-label">キーワード検索</label>
              <button id="clearBtn" class="text-clear-btn">条件をクリア</button>
            </div>
            <input type="text" id="searchBox" placeholder="曲名・歌手・読み..." aria-label="曲名・歌手・読みで検索" disabled>
          </div>

          <div class="sidebar-section">
            <div class="section-header">
              <label class="section-label">日付範囲</label>
            </div>
            <div class="date-row">
              <span class="section-label date-row-label">From</span>
              <div class="date-select-group">
                <select id="dateFromYear" class="date-select year" aria-label="開始年"></select>
                <select id="dateFromMonth" class="date-select month" aria-label="開始月"></select>
                <select id="dateFromDay" class="date-select day" aria-label="開始日"></select>
              </div>
              <button id="clearDateFromBtn" class="date-clear-btn" aria-label="開始日をクリア">&times;</button>
            </div>
            <div class="date-row">
              <span class="section-label date-row-label">To</span>
              <div class="date-select-group">
                <select id="dateToYear" class="date-select year" aria-label="終了年"></select>
                <select id="dateToMonth" class="date-select month" aria-label="終了月"></select>
                <select id="dateToDay" class="date-select day" aria-label="終了日"></select>
              </div>
              <button id="clearDateToBtn" class="date-clear-btn" aria-label="終了日をクリア">&times;</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="section-header">
              <label class="section-label">動画の種類</label>
            </div>
            <div id="formatsList" class="filter-group-stack"></div>
          </div>

          <div class="sidebar-section sidebar-flags">
            <label class="checkbox-item"><input type="checkbox" id="relayOnly"> 歌枠リレー</label>
            <label class="checkbox-item"><input type="checkbox" id="collabHostOnly"> コラボ(ホスト)</label>
            <label class="checkbox-item"><input type="checkbox" id="harmonyOnly"> ハモリあり</label>
            <label class="checkbox-item"><input type="checkbox" id="collabGuestOnly"> コラボ(ゲスト)</label>
          </div>
        </div>
      </section>

      <button id="open-bookmark-panel" class="sidebar-link-row" type="button" aria-haspopup="dialog" aria-controls="bookmark-sidebar-panel">
        <span>ブックマーク</span>
        <span class="sidebar-link-row-arrow" aria-hidden="true">›</span>
      </button>

      <button id="open-settings-panel" class="sidebar-link-row" type="button" aria-haspopup="dialog" aria-controls="settings-sidebar-panel">
        <span>設定</span>
        <span class="sidebar-link-row-arrow" aria-hidden="true">›</span>
      </button>
    </div>

    <div id="settings-sidebar-panel" class="sidebar-subpanel" aria-hidden="true" hidden>
      <div class="sidebar-subpanel-header">
        <button id="close-settings-panel" class="sidebar-subpanel-back" type="button" aria-label="検索・設定に戻る">← 設定</button>
        <button id="close-settings-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
      </div>
      <div class="sidebar-subpanel-body">
        <section class="sidebar-group">
          <div class="sidebar-group-header">
            <div class="sidebar-group-title">表示</div>
          </div>
          <div class="sidebar-group-body">
            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span>サムネイル表示</span>
                <label class="switch">
                  <input type="checkbox" id="thumbnail-toggle" aria-label="サムネイル表示を切り替える">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span>ダークモード</span>
                <label class="switch">
                  <input type="checkbox" id="theme-toggle" aria-label="ダークモードを切り替える">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

          </div>
        </section>

        <section id="playback-settings-group" class="sidebar-group" aria-hidden="true" hidden>
          <div class="sidebar-group-header">
            <div class="sidebar-group-title">再生</div>
          </div>
          <div class="sidebar-group-body">
            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span>曲の終わりで停止する</span>
                <label class="switch">
                  <input type="checkbox" id="end-time-toggle" aria-label="曲の終わりで停止するかを切り替える">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="setting-item-copy">
                <div class="menu-item-toggle">
                  <span>終了後、次の曲を再生</span>
                  <label class="switch">
                    <input type="checkbox" id="continuous-playback-toggle" aria-label="終了後、次の曲を再生するかを切り替える">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="setting-item-help">現在の一覧で、次の曲へ順に進みます。</div>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="setting-item-copy">
                <div class="menu-item-toggle">
                  <span>リピート再生</span>
                  <label class="switch">
                    <input type="checkbox" id="loop-playback-toggle" aria-label="リピート再生を切り替える">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="setting-item-help">「終了後、次の曲を再生」がOFFでは1曲、ONでは一覧全体を繰り返します。</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div id="bookmark-sidebar-panel" class="sidebar-subpanel" aria-hidden="true" hidden>
      <div class="sidebar-subpanel-header">
        <button id="close-bookmark-panel" class="sidebar-subpanel-back" type="button" aria-label="検索・設定に戻る">← ブックマーク</button>
        <button id="close-bookmark-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
      </div>
      <div class="sidebar-subpanel-body">
        <div id="bookmark-panel-create" class="bookmark-panel-create">
          <input type="text" id="bookmark-panel-new-name" placeholder="新規ブックマーク名" aria-label="新規ブックマーク名" maxlength="64">
          <button id="bookmark-panel-create-btn" type="button">作成</button>
          <div id="bookmark-panel-error" class="bookmark-panel-error" hidden></div>
        </div>
        <div class="bookmark-panel-actions" aria-label="ブックマークの入出力">
          <button id="bookmark-panel-import-btn" type="button">インポート</button>
          <button id="bookmark-panel-export-btn" type="button">エクスポート</button>
          <input id="bookmark-panel-import-input" type="file" accept="application/json,.json" hidden>
        </div>
        <div id="bookmark-list" class="bookmark-list"></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left"></div>
      <h1 class="header-title">鐘輝かう 歌サーチ</h1>
      <div class="header-right">
        <button id="open-sidebar" class="menu-trigger-btn">☰</button>
      </div>
    </header>
    
    <div class="container">
      <div id="resultList"></div>
      <div id="loadMoreContainer" class="load-more-container hidden">
        <button id="loadMoreBtn" class="load-more-btn">つづきを表示</button>
      </div>
    </div>

    <footer class="site-footer">
      <p>
        本サイトは非公式のファンメイドです。掲載している動画・楽曲等の著作権は各権利者に帰属します。<br>
        YouTube 上の公開情報を参照しており、コンテンツの再配布は行いません。
      </p>
    </footer>
  </main>
  <script type="module" src="app/bootstrap.mjs?v=21"></script>
</body>
</html>
