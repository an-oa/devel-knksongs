<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かねきかう 歌サーチ</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://an-oa.github.io/knksongs/" />

  <!-- OGP -->
  <meta property="og:site_name" content="かねきかう 歌サーチ" />
  <meta property="og:title" content="かねきかう 歌サーチ" />
  <meta property="og:description" content="公開スプレッドシート由来の歌データを、曲名・アーティスト名で検索できます（配信/歌みた/ショート/切り抜き、リレー/ハモリの絞り込み対応）。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://an-oa.github.io/knksongs/" />
  <meta property="og:image" content="https://an-oa.github.io/knksongs/ogp.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="800" />

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="かねきかう 歌サーチ" />
  <meta name="twitter:description" content="曲名・アーティスト名で検索。配信/歌みた/ショート/切り抜き、リレー/ハモリで絞り込み。" />
  <meta name="twitter:image" content="https://an-oa.github.io/knksongs/ogp.png" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark-theme');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <div id="sidebar-overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar" role="dialog" aria-modal="true" aria-labelledby="sidebar-title" aria-hidden="true">
    <div class="sidebar-header">
      <div class="sidebar-title-group">
        <h2 id="sidebar-title">検索・設定</h2>
        <div id="resultCount">接続中...</div>
      </div>
      <button id="close-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
    </div>

    <div class="sidebar-scroll-area">
      <div class="sidebar-section">
        <div class="section-header">
          <label class="section-label">キーワード検索</label>
          <button id="clearBtn" class="text-clear-btn">条件をクリア</button>
        </div>
        <input type="text" id="searchBox" placeholder="曲名・歌手・読み..." aria-label="曲名・歌手・読みで検索" disabled>
      </div>

      <div class="sidebar-section">
        <div class="date-row">
          <span class="section-label date-row-label">From</span>
          <div class="date-select-group">
            <select id="dateFromYear" class="date-select year" aria-label="開始年"></select>
            <select id="dateFromMonth" class="date-select month" aria-label="開始月"></select>
            <select id="dateFromDay" class="date-select day" aria-label="開始日"></select>
          </div>
        </div>
        <div class="date-row">
          <span class="section-label date-row-label">To</span>
          <div class="date-select-group">
            <select id="dateToYear" class="date-select year" aria-label="終了年"></select>
            <select id="dateToMonth" class="date-select month" aria-label="終了月"></select>
            <select id="dateToDay" class="date-select day" aria-label="終了日"></select>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div id="formatsList" class="filter-group-stack"></div>
      </div>

      <div class="sidebar-section">
        <label class="checkbox-item"><input type="checkbox" id="relayOnly"> 🚩 歌枠リレー</label>
        <label class="checkbox-item"><input type="checkbox" id="harmonyOnly"> ✨ ハモリあり</label>
      </div>

      <hr>

      <div class="sidebar-section">
        <div class="menu-item-toggle">
          <span>サムネイル表示</span>
          <label class="switch">
            <input type="checkbox" id="thumbnail-toggle" aria-label="サムネイル表示を切り替える">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="menu-item-toggle">
          <span>ダークモード</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" aria-label="ダークモードを切り替える">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left"></div>
      <h1 class="header-title">かねきかう 歌サーチ</h1>
      <div class="header-right">
        <button id="open-sidebar" class="menu-trigger-btn">☰</button>
      </div>
    </header>
    
    <div class="container">
      <div id="resultList"></div>
      <div id="loadMoreContainer" class="load-more-container hidden">
        <button id="loadMoreBtn" class="load-more-btn">つづきを表示</button>
      </div>
    </div>

    <footer class="site-footer">
      <p>
        本サイトは非公式のファンメイドです。掲載している動画・楽曲等の著作権は各権利者に帰属します。<br>
        YouTube 上の公開情報を参照しており、コンテンツの再配布は行いません。
      </p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
