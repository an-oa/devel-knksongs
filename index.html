<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かねきかう 歌サーチ</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://an-oa.github.io/knksongs/" />

  <!-- OGP -->
  <meta property="og:site_name" content="かねきかう 歌サーチ" />
  <meta property="og:title" content="かねきかう 歌サーチ" />
  <meta property="og:description" content="公開スプレッドシート由来の歌データを、曲名・アーティスト名で検索できます（配信/動画/ショート/切り抜き、リレー/ハモリの絞り込み対応）。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://an-oa.github.io/knksongs/" />
  <meta property="og:image" content="https://an-oa.github.io/knksongs/ogp.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="800" />

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="かねきかう 歌サーチ" />
  <meta name="twitter:description" content="曲名・アーティスト名で検索。配信/動画/ショート/切り抜き、リレー/ハモリで絞り込み。" />
  <meta name="twitter:image" content="https://an-oa.github.io/knksongs/ogp.png" />

  <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme">

  <div id="sidebar-overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-group">
        <h2>検索・設定</h2>
        <div id="resultCount">接続中...</div>
      </div>
      <button id="close-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
    </div>

    <div class="sidebar-scroll-area">
      <div class="sidebar-section">
        <div class="section-header">
          <label class="section-label">キーワード検索</label>
          <button id="clearBtn" class="text-clear-btn">条件をクリア</button>
        </div>
        <input type="text" id="searchBox" placeholder="曲名・歌手・読み..." disabled>
      </div>

      <div class="sidebar-section">
        <div id="formatsList" class="filter-group-stack"></div>
      </div>

      <div class="sidebar-section">
        <label class="checkbox-item"><input type="checkbox" id="relayOnly"> 🚩 歌枠リレー</label>
        <label class="checkbox-item"><input type="checkbox" id="harmonyOnly"> ✨ ハモリあり</label>
      </div>

      <hr>

      <div class="sidebar-section">
        <div class="menu-item-toggle">
          <span>サムネイル表示</span>
          <label class="switch">
            <input type="checkbox" id="thumbnail-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="menu-item-toggle">
          <span>ダークモード</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <button id="open-sidebar" class="menu-trigger-btn">☰ 検索</button>
      </div>
      <h1 class="header-title">かねきかう 歌サーチ</h1>
      <div class="header-right"></div>
    </header>
    
    <div class="container">
      <div id="resultList"></div>
      <div id="loadMoreContainer" class="load-more-container hidden">
        <button id="loadMoreBtn" class="load-more-btn">つづきを表示</button>
      </div>
    </div>

    <footer class="site-footer">
      <p>
        本サイトは非公式のファンメイドです。掲載している動画・楽曲等の著作権は各権利者に帰属します。<br>
        YouTube 上の公開情報を参照しており、コンテンツの再配布は行いません。
      </p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
