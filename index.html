<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鐘輝かう 歌サーチ</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://an-oa.github.io/knksongs/" />

  <!-- OGP -->
  <meta property="og:site_name" content="鐘輝かう 歌サーチ" />
  <meta property="og:title" content="鐘輝かう 歌サーチ" />
  <meta property="og:description" content="曲名・アーティスト名・読みで検索。配信/歌みた/ショート/切り抜き/収録、コラボ種別、リレー/ハモリ、日付範囲で絞り込み。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://an-oa.github.io/knksongs/" />
  <meta property="og:image" content="https://an-oa.github.io/knksongs/ogp.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="800" />
  <meta name="color-scheme" content="light dark" />

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="鐘輝かう 歌サーチ" />
  <meta name="twitter:description" content="曲名・アーティスト名・読みで検索。配信/歌みた/ショート/切り抜き/収録、コラボ種別、リレー/ハモリ、日付範囲で絞り込み。" />
  <meta name="twitter:image" content="https://an-oa.github.io/knksongs/ogp.png" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = saved === 'dark' || (!saved && prefersDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        if (isDark) {
          document.documentElement.classList.add('dark-theme');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=23">
</head>
<body>

  <div id="sidebar-overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar" role="dialog" aria-modal="true" aria-labelledby="sidebar-title" aria-hidden="true" popover="manual">
    <div class="sidebar-sheet">
    <div class="sidebar-header">
      <div class="sidebar-title-group">
        <h2 id="sidebar-title">検索・設定</h2>
        <div id="resultCount">接続中...</div>
      </div>
      <button id="close-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
    </div>

    <div class="sidebar-scroll-area">
      <section class="sidebar-group">
        <div class="sidebar-group-body">
          <div class="sidebar-section">
            <div class="section-header">
              <label class="section-label" for="searchBox">キーワード検索</label>
              <button id="clearBtn" class="text-clear-btn">条件をクリア</button>
            </div>
            <input type="text" id="searchBox" placeholder="曲名・歌手・読み..." disabled>
          </div>

          <fieldset class="sidebar-section sidebar-fieldset">
            <legend class="section-label sidebar-fieldset-legend">日付範囲</legend>
            <div class="date-row">
              <span class="section-label date-row-label">From</span>
              <div class="date-select-group">
                <label class="visually-hidden" for="dateFromYear">開始年</label>
                <select id="dateFromYear" class="date-select year"></select>
                <label class="visually-hidden" for="dateFromMonth">開始月</label>
                <select id="dateFromMonth" class="date-select month"></select>
                <label class="visually-hidden" for="dateFromDay">開始日</label>
                <select id="dateFromDay" class="date-select day"></select>
              </div>
              <button id="clearDateFromBtn" class="date-clear-btn" aria-label="開始日をクリア">&times;</button>
            </div>
            <div class="date-row">
              <span class="section-label date-row-label">To</span>
              <div class="date-select-group">
                <label class="visually-hidden" for="dateToYear">終了年</label>
                <select id="dateToYear" class="date-select year"></select>
                <label class="visually-hidden" for="dateToMonth">終了月</label>
                <select id="dateToMonth" class="date-select month"></select>
                <label class="visually-hidden" for="dateToDay">終了日</label>
                <select id="dateToDay" class="date-select day"></select>
              </div>
              <button id="clearDateToBtn" class="date-clear-btn" aria-label="終了日をクリア">&times;</button>
            </div>
          </fieldset>

          <fieldset class="sidebar-section sidebar-fieldset">
            <legend class="section-label sidebar-fieldset-legend">動画の種類</legend>
            <div id="formatsList" class="filter-group-stack"></div>
          </fieldset>

          <fieldset class="sidebar-section sidebar-fieldset sidebar-flags">
            <legend class="visually-hidden">追加条件</legend>
            <label class="checkbox-item" for="relayOnly"><input type="checkbox" id="relayOnly"> 歌枠リレー</label>
            <label class="checkbox-item" for="collabHostOnly"><input type="checkbox" id="collabHostOnly"> コラボ(ホスト)</label>
            <label class="checkbox-item" for="harmonyOnly"><input type="checkbox" id="harmonyOnly"> ハモリあり</label>
            <label class="checkbox-item" for="collabGuestOnly"><input type="checkbox" id="collabGuestOnly"> コラボ(ゲスト)</label>
          </fieldset>
        </div>
      </section>

      <button id="open-bookmark-panel" class="sidebar-link-row" type="button" aria-haspopup="dialog" aria-controls="bookmark-sidebar-panel">
        <span>ブックマーク</span>
        <span class="sidebar-link-row-arrow" aria-hidden="true">›</span>
      </button>

      <button id="open-settings-panel" class="sidebar-link-row" type="button" aria-haspopup="dialog" aria-controls="settings-sidebar-panel">
        <span>設定</span>
        <span class="sidebar-link-row-arrow" aria-hidden="true">›</span>
      </button>
    </div>

    <div id="settings-sidebar-panel" class="sidebar-subpanel" aria-hidden="true" hidden>
      <div class="sidebar-subpanel-header">
        <button id="close-settings-panel" class="sidebar-subpanel-back" type="button" aria-label="検索・設定に戻る">← 設定</button>
        <button id="close-settings-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
      </div>
      <div class="sidebar-subpanel-body">
        <section class="sidebar-group">
          <div class="sidebar-group-header">
            <div class="sidebar-group-title">表示</div>
          </div>
          <div class="sidebar-group-body">
            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span id="thumbnail-toggle-label">サムネイル表示</span>
                <label class="switch">
                  <input type="checkbox" id="thumbnail-toggle" aria-labelledby="thumbnail-toggle-label">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span id="theme-toggle-label">ダークモード</span>
                <label class="switch">
                  <input type="checkbox" id="theme-toggle" aria-labelledby="theme-toggle-label">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

          </div>
        </section>

        <section id="playback-settings-group" class="sidebar-group" aria-hidden="true" hidden>
          <div class="sidebar-group-header">
            <div class="sidebar-group-title">再生</div>
          </div>
          <div class="sidebar-group-body">
            <div class="sidebar-section sidebar-setting-item">
              <div class="menu-item-toggle">
                <span id="end-time-toggle-label">曲の終わりで停止する</span>
                <label class="switch">
                  <input type="checkbox" id="end-time-toggle" aria-labelledby="end-time-toggle-label">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="setting-item-copy">
                <div class="menu-item-toggle">
                  <span id="continuous-playback-toggle-label">終了後、次の曲を再生</span>
                  <label class="switch">
                    <input type="checkbox" id="continuous-playback-toggle" aria-labelledby="continuous-playback-toggle-label">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="setting-item-help">現在の一覧で、次の曲へ順に進みます。</div>
              </div>
            </div>

            <div class="sidebar-section sidebar-setting-item">
              <div class="setting-item-copy">
                <div class="menu-item-toggle">
                  <span id="loop-playback-toggle-label">リピート再生</span>
                  <label class="switch">
                    <input type="checkbox" id="loop-playback-toggle" aria-labelledby="loop-playback-toggle-label">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="setting-item-help">「終了後、次の曲を再生」がOFFでは1曲、ONでは一覧全体を繰り返します。</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div id="bookmark-sidebar-panel" class="sidebar-subpanel" aria-hidden="true" hidden>
      <div class="sidebar-subpanel-header">
        <button id="close-bookmark-panel" class="sidebar-subpanel-back" type="button" aria-label="検索・設定に戻る">← ブックマーク</button>
        <button id="close-bookmark-sidebar" class="close-btn" aria-label="閉じる">&times;</button>
      </div>
      <div class="sidebar-subpanel-body">
        <div id="bookmark-panel-create" class="bookmark-panel-create">
          <label class="visually-hidden" for="bookmark-panel-new-name">新規ブックマーク名</label>
          <input type="text" id="bookmark-panel-new-name" placeholder="新規ブックマーク名" maxlength="64">
          <button id="bookmark-panel-create-btn" type="button">作成</button>
          <div id="bookmark-panel-error" class="bookmark-panel-error" hidden></div>
        </div>
        <div class="bookmark-panel-actions" role="group" aria-label="ブックマークの入出力">
          <button id="bookmark-panel-import-btn" type="button">インポート</button>
          <button id="bookmark-panel-export-btn" type="button">エクスポート</button>
          <input id="bookmark-panel-import-input" type="file" accept="application/json,.json" hidden>
        </div>
        <div id="bookmark-list" class="bookmark-list"></div>
      </div>
    </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left"></div>
      <h1 class="header-title">鐘輝かう 歌サーチ</h1>
      <div class="header-right">
        <button id="open-sidebar" class="menu-trigger-btn" aria-label="検索・設定を開く" aria-expanded="false" aria-controls="sidebar">☰</button>
      </div>
    </header>
    
    <section class="container" aria-labelledby="result-list-title">
      <h2 id="result-list-title" class="visually-hidden">検索結果</h2>
      <ol id="resultList" class="result-list"></ol>
      <div id="loadMoreContainer" class="load-more-container hidden">
        <button id="loadMoreBtn" class="load-more-btn">つづきを表示</button>
      </div>
    </section>

    <footer class="site-footer">
      <p>
        本サイトは非公式のファンメイドです。掲載している動画・楽曲等の著作権は各権利者に帰属します。<br>
        YouTube 上の公開情報を参照しており、コンテンツの再配布は行いません。
      </p>
    </footer>
  </main>
  <script type="module" src="app/bootstrap.mjs?v=23"></script>
</body>
</html>
