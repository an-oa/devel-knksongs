name: Update songs json and deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6,18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-songs-json-and-deploy-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm

      - run: npm ci

      - run: npm run build:songs-json

      - run: npm run validate:songs-json

      - name: Commit generated songs json
        run: |
          if git diff --quiet -- data/songs.json data/songs-meta.json; then
            echo "No generated changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/songs.json data/songs-meta.json
            git commit -m "chore: update generated songs json" -m "- 公開CSVから songs.json と songs-meta.json を再生成した。"
            git push
          fi

      - name: Prepare Pages artifact
        env:
          DEPLOY_CACHE_BUSTER: ${{ github.sha }}
        run: npm run build:pages-artifact

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - uses: actions/deploy-pages@v5
