name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run validate:songs-json:raw

      - run: npm run typecheck:raw

      - run: npm run check:ts-emit:raw

      - run: npm run lint:raw

      - run: npm run test:unit:raw
